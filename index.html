<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>חוסמים את הציר — תלת מימד</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
    }

    canvas { display: block; width: 100% !important; height: 100% !important; }

    /* ── HUD ── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    #score-panel {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,200,0,0.3);
      border-radius: 10px;
      padding: 10px 16px;
      min-width: 160px;
      backdrop-filter: blur(8px);
    }

    #score-panel h3 {
      font-size: 11px;
      color: #ffc800;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin: 3px 0;
      color: #ddd;
    }
    .stat-row span:last-child { color: #fff; font-weight: bold; }

    #timer-bar {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 6px 20px;
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 3px;
      backdrop-filter: blur(8px);
      color: #fff;
    }

    #phase-bar {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      border-radius: 6px;
      padding: 4px 14px;
      font-size: 12px;
      color: #ffc800;
      letter-spacing: 1px;
    }

    /* Water cannon meter */
    #water-meter {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      text-align: center;
    }
    #water-meter label {
      font-size: 11px;
      color: #88ccff;
      letter-spacing: 1px;
    }
    #water-track {
      margin-top: 4px;
      height: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
    }
    #water-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3399ff, #0044cc);
      transition: width 0.3s;
    }

    /* Traffic jam */
    #jam-meter {
      position: absolute;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: #ffaa00;
    }

    /* ── CAMERA CONTROLS ── */
    #cam-controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      pointer-events: all;
    }

    .cam-btn {
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      backdrop-filter: blur(6px);
    }
    .cam-btn:hover, .cam-btn.active {
      background: rgba(255,200,0,0.2);
      border-color: #ffc800;
      color: #ffc800;
    }

    /* ── ACTION BAR ── */
    #action-bar {
      position: absolute;
      bottom: 60px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      pointer-events: all;
    }

    .action-btn {
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      text-align: center;
      min-width: 90px;
      transition: all 0.15s;
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .action-btn:hover {
      background: rgba(255,200,0,0.15);
      border-color: #ffc800;
    }
    .action-btn .cost { font-size: 10px; color: #888; margin-right: auto; }
    .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── SELECTION BOX ── */
    #sel-box {
      position: fixed;
      border: 2px solid rgba(100,200,255,0.7);
      background: rgba(100,200,255,0.08);
      display: none;
      pointer-events: none;
      z-index: 20;
    }

    /* ── FLOATING MESSAGES ── */
    #msg-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 30;
    }

    .float-msg {
      position: absolute;
      font-size: 16px;
      font-weight: bold;
      pointer-events: none;
      animation: floatUp 1.8s ease-out forwards;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-60px); }
    }

    /* ── MENU / SPLASH ── */
    #splash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #splash h1 {
      font-size: clamp(28px, 6vw, 52px);
      font-weight: 900;
      color: #ffc800;
      letter-spacing: -1px;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(255,200,0,0.4);
    }
    #splash p {
      color: #aaa;
      margin-bottom: 40px;
      font-size: 14px;
      letter-spacing: 1px;
    }

    #location-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      max-width: 420px;
      width: 90%;
      margin-bottom: 32px;
    }

    .loc-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 18px 12px;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      font-size: 15px;
    }
    .loc-btn:hover {
      background: rgba(255,200,0,0.12);
      border-color: #ffc800;
      color: #ffc800;
      transform: translateY(-2px);
    }
    .loc-btn small { display: block; font-size: 11px; color: #777; margin-top: 4px; }

    /* ── END SCREEN ── */
    #end-screen {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 90;
      backdrop-filter: blur(10px);
    }
    #end-screen.show { display: flex; }

    .end-card {
      background: rgba(10,10,20,0.95);
      border: 1px solid rgba(255,200,0,0.3);
      border-radius: 16px;
      padding: 40px;
      max-width: 380px;
      width: 90%;
      text-align: center;
    }
    .end-card h2 { font-size: 28px; color: #ffc800; margin-bottom: 24px; }
    .end-stat { font-size: 15px; margin: 8px 0; color: #ccc; }
    .end-stat strong { color: #fff; font-size: 20px; }
    .end-btn {
      margin-top: 24px;
      padding: 12px 32px;
      background: #ffc800;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #loading h2 { color: #ffc800; margin-bottom: 16px; }
    #loading p { color: #666; font-size: 13px; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,200,0,0.2);
      border-top-color: #ffc800;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOCUS TARGET INDICATOR ── */
    #focus-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      pointer-events: none;
    }
    #focus-indicator .ring {
      width: 60px; height: 60px;
      border: 2px solid rgba(100,255,100,0.6);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.3); opacity: 0.3; }
    }

    /* Mobile touch controls */
    #touch-controls {
      position: absolute;
      bottom: 110px;
      left: 12px;
      display: none;
      flex-direction: column;
      gap: 6px;
      pointer-events: all;
    }
    @media (max-width: 600px) {
      #touch-controls { display: flex; }
      #location-grid { grid-template-columns: 1fr; }
    }

    .touch-btn {
      background: rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      backdrop-filter: blur(6px);
    }

    #controls-hint {
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <h2>טוען עולם תלת מימדי...</h2>
  <p id="load-status">מאתחל Three.js...</p>
</div>

<!-- SPLASH / MENU -->
<div id="splash" style="display:none">
  <h1>חוסמים את הציר 3D</h1>
  <p>סימולטור הפגנות · תלת מימד</p>
  <div id="location-grid">
    <button class="loc-btn" onclick="startGame('bar-ilan')">📍 צומת בר אילן <small>רמת קושי: בינונית</small></button>
    <button class="loc-btn" onclick="startGame('highway4')">🛣️ כביש 4 <small>רמת קושי: גבוהה</small></button>
    <button class="loc-btn" onclick="startGame('bridge')">🌉 גשר המיתרים <small>רמת קושי: קשה</small></button>
    <button class="loc-btn" onclick="startGame('dizengoff')">🏙️ כיכר דיזנגוף <small>רמת קושי: קלה</small></button>
  </div>
</div>

<!-- CANVAS -->
<div id="canvas-container"></div>

<!-- HUD -->
<div id="hud" style="display:none">
  <div id="score-panel">
    <h3>⚡ ניקוד</h3>
    <div class="stat-row"><span>ניקוד</span><span id="score-val">0</span></div>
    <div class="stat-row"><span>מפגינים</span><span id="protesters-val">0</span></div>
    <div class="stat-row"><span>פקק</span><span id="jam-val">0.0 ק"מ</span></div>
  </div>

  <div id="timer-bar">00:00</div>
  <div id="phase-bar">🏁 שלב: התארגנות</div>

  <div id="jam-meter"></div>

  <div id="water-meter">
    <label>מכת"זית 💧</label>
    <div id="water-track"><div id="water-fill"></div></div>
  </div>

  <!-- Camera controls -->
  <div id="cam-controls">
    <button class="cam-btn active" id="btn-overhead" onclick="setCameraMode('overhead')">🔭 מבט על</button>
    <button class="cam-btn" id="btn-street" onclick="setCameraMode('street')">🏘️ מבט רחוב</button>
    <button class="cam-btn" id="btn-follow" onclick="setCameraMode('follow')">🎯 עקוב אחרי</button>
    <button class="cam-btn" id="btn-free" onclick="setCameraMode('free')">🕹️ חופשי</button>
  </div>

  <!-- Action bar -->
  <div id="action-bar">
    <button class="action-btn" onclick="spawnProtester('youth')">
      🎩 בחור ישיבה <span class="cost">50</span>
    </button>
    <button class="action-btn" onclick="spawnProtester('veteran')">
      🧔 אברך <span class="cost">150</span>
    </button>
    <button class="action-btn" onclick="spawnProtester('activist')">
      📱 עסקן <span class="cost">250</span>
    </button>
    <button class="action-btn" onclick="useSpecial('pashkevil')">
      📜 פשקוויל <span class="cost">500</span>
    </button>
    <button class="action-btn" onclick="useSpecial('shofar')">
      🐏 שופר <span class="cost">1000</span>
    </button>
    <button class="action-btn" id="end-btn" onclick="endGame()" style="border-color:rgba(255,80,80,0.4);margin-top:8px;">
      🏁 סיים
    </button>
  </div>

  <!-- Selection box -->
  <div id="sel-box"></div>

  <!-- Focus indicator -->
  <div id="focus-indicator"><div class="ring"></div></div>

  <!-- Floating messages -->
  <div id="msg-layer"></div>

  <!-- Controls hint -->
  <div id="controls-hint">
    לחץ שמאל: בחר/הזז · ימני+גרירה: מצלמה · גלגלת: זום · F: עקוב אחרי נבחר
  </div>

  <!-- Mobile -->
  <div id="touch-controls">
    <button class="touch-btn" onclick="spawnProtester('youth')">➕ בחור ישיבה</button>
    <button class="touch-btn" onclick="spawnProtester('veteran')">➕ אברך</button>
  </div>
</div>

<!-- END SCREEN -->
<div id="end-screen">
  <div class="end-card">
    <h2>ההפגנה הסתיימה!</h2>
    <div class="end-stat">ניקוד: <strong id="final-score">0</strong></div>
    <div class="end-stat">זמן חסימה: <strong id="final-time">0:00</strong></div>
    <div class="end-stat">פקק מקסימלי: <strong id="final-jam">0 ק"מ</strong></div>
    <div class="end-stat">מפגינים ששרדו: <strong id="final-survived">0</strong></div>
    <button class="end-btn" onclick="resetGame()">🔄 שחק שוב</button>
  </div>
</div>

<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>
// ═══════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════
const State = {
  score: 0,
  time: 0,
  phase: 0, // 0=prep 1=protest 2=police 3=cavalry 4=water
  protesters: [],
  vehicles: [],
  police: [],
  selected: [],
  jamKm: 0,
  maxJam: 0,
  waterLevel: 0,
  running: false,
  location: 'bar-ilan',
  focusTarget: null,
  cameraMode: 'overhead', // overhead | street | follow | free
  costs: { youth:50, veteran:150, activist:250 },
  survived: 0,
};

// ═══════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════
let scene, camera, renderer, clock;
let raycaster, mouse;
let groundMesh, streetMesh;
let selBoxStart = null, isSelecting = false;

function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.FogExp2(0x87CEEB, 0.018);

  camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
  camera.position.set(0, 30, 30);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  clock = new THREE.Clock();
  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  // Lighting
  const ambient = new THREE.AmbientLight(0xfff4e0, 0.6);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0xfff4e0, 1.2);
  sun.position.set(30, 60, 30);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 0.5;
  sun.shadow.camera.far = 200;
  sun.shadow.camera.left = -60;
  sun.shadow.camera.right = 60;
  sun.shadow.camera.top = 60;
  sun.shadow.camera.bottom = -60;
  scene.add(sun);

  const fill = new THREE.DirectionalLight(0x8888ff, 0.3);
  fill.position.set(-30, 20, -30);
  scene.add(fill);

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  setupControls();
  document.getElementById('load-status').textContent = 'בונה עיר...';
}

// ═══════════════════════════════════════════════
//  CITY BUILDER — procedural geometry 
// (מחכה למודלי GLB שלך, עובד ללא)
// ═══════════════════════════════════════════════
const cityObjects = [];

function buildCity(locationKey) {
  // Clear
  cityObjects.forEach(o => scene.remove(o));
  cityObjects.length = 0;

  // Ground
  const groundGeo = new THREE.PlaneGeometry(200, 200);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x3a7a3a });
  groundMesh = new THREE.Mesh(groundGeo, groundMat);
  groundMesh.rotation.x = -Math.PI / 2;
  groundMesh.receiveShadow = true;
  groundMesh.name = 'ground';
  scene.add(groundMesh);
  cityObjects.push(groundMesh);

  // Main road (horizontal)
  const roadW = 14, roadL = 160;
  const roadGeo = new THREE.PlaneGeometry(roadL, roadW);
  const roadMat = new THREE.MeshLambertMaterial({ color: 0x333340 });
  streetMesh = new THREE.Mesh(roadGeo, roadMat);
  streetMesh.rotation.x = -Math.PI / 2;
  streetMesh.position.y = 0.02;
  streetMesh.receiveShadow = true;
  streetMesh.name = 'road';
  scene.add(streetMesh);
  cityObjects.push(streetMesh);

  // Cross road (vertical)
  const crossGeo = new THREE.PlaneGeometry(roadW, roadL);
  const crossMesh = new THREE.Mesh(crossGeo, roadMat.clone());
  crossMesh.rotation.x = -Math.PI / 2;
  crossMesh.position.y = 0.03;
  scene.add(crossMesh);
  cityObjects.push(crossMesh);

  // Road markings
  for (let i = -70; i < 70; i += 8) {
    const markGeo = new THREE.PlaneGeometry(5, 0.4);
    const markMat = new THREE.MeshLambertMaterial({ color: 0xffff88 });
    const mark = new THREE.Mesh(markGeo, markMat);
    mark.rotation.x = -Math.PI / 2;
    mark.position.set(i, 0.04, 0);
    scene.add(mark);
    cityObjects.push(mark);
  }

  // Sidewalks
  for (let side of [-1, 1]) {
    const swGeo = new THREE.PlaneGeometry(roadL, 4);
    const swMat = new THREE.MeshLambertMaterial({ color: 0xbbaa88 });
    const sw = new THREE.Mesh(swGeo, swMat);
    sw.rotation.x = -Math.PI / 2;
    sw.position.set(0, 0.05, side * (roadW / 2 + 2));
    scene.add(sw);
    cityObjects.push(sw);
  }

  // Buildings — procedural grid
  const buildingColors = [0xcc9966, 0xddbbaa, 0xaaaacc, 0x998877, 0xccccbb, 0xbb9988];
  const positions = [
    { x: -50, z: -20 }, { x: -35, z: -22 }, { x: -20, z: -18 },
    { x: 10, z: -19 }, { x: 25, z: -22 }, { x: 40, z: -20 },
    { x: -50, z: 20 }, { x: -35, z: 22 }, { x: -20, z: 19 },
    { x: 10, z: 20 }, { x: 25, z: 22 }, { x: 40, z: 21 },
    { x: -60, z: -15 }, { x: 55, z: -16 }, { x: -60, z: 15 }, { x: 55, z: 16 },
  ];

  positions.forEach(pos => {
    const w = 8 + Math.random() * 10;
    const d = 8 + Math.random() * 10;
    const h = 6 + Math.random() * 20;
    const geo = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshLambertMaterial({
      color: buildingColors[Math.floor(Math.random() * buildingColors.length)]
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(pos.x, h / 2, pos.z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    cityObjects.push(mesh);

    // Windows
    addWindows(mesh, w, h, d);
  });

  // Traffic lights at intersection
  spawnTrafficLight(6, 6);
  spawnTrafficLight(-6, 6);
  spawnTrafficLight(6, -6);
  spawnTrafficLight(-6, -6);

  // Spawn area marker
  spawnSpawnZone();
}

function addWindows(building, w, h, d) {
  const wMat = new THREE.MeshLambertMaterial({ color: 0x88aadd, emissive: 0x224466 });
  const rows = Math.floor(h / 3);
  const cols = Math.floor(w / 2.5);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() < 0.7) {
        const wGeo = new THREE.PlaneGeometry(0.8, 1.2);
        const wMesh = new THREE.Mesh(wGeo, wMat);
        const bpos = building.position;
        wMesh.position.set(
          bpos.x - w / 2 + 1.5 + c * 2.4,
          bpos.y - h / 2 + 1.5 + r * 2.8,
          bpos.z + d / 2 + 0.01
        );
        scene.add(wMesh);
        cityObjects.push(wMesh);
      }
    }
  }
}

function spawnTrafficLight(x, z) {
  const pole = new THREE.Mesh(

// ═══════════════════════════════════════════════
//  PROTESTER TYPES
// ═══════════════════════════════════════════════
const PROTESTER_TYPES = {
  youth:    { color: 0x4488ff, height: 1.7, speed: 3.5, resilience: 1, label: 'בחור' },
  veteran:  { color: 0x884400, height: 1.8, speed: 2,   resilience: 3, label: 'אברך' },
  activist: { color: 0xff8800, height: 1.75, speed: 2.5, resilience: 2, label: 'עסקן' },
};

function createProtesterMesh(type) {
  const cfg = PROTESTER_TYPES[type];
  const group = new THREE.Group();

  // Body
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.25, 0.25, cfg.height * 0.6, 8),
    new THREE.MeshLambertMaterial({ color: cfg.color })
  );
  body.position.y = cfg.height * 0.3;
  body.castShadow = true;
  group.add(body);

  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.22, 10, 8),
    new THREE.MeshLambertMaterial({ color: 0xffcc99 })
  );
  head.position.y = cfg.height * 0.65;
  head.castShadow = true;
  group.add(head);

  // Hat (for youth/veteran)
  if (type === 'youth' || type === 'veteran') {
    const hat = new THREE.Mesh(
      new THREE.CylinderGeometry(0.22, 0.22, 0.25, 8),
      new THREE.MeshLambertMaterial({ color: 0x111111 })
    );
    hat.position.y = cfg.height * 0.65 + 0.3;
    group.add(hat);
  }

  // Arms
  for (let s of [-1, 1]) {
    const arm = new THREE.Mesh(
      new THREE.CylinderGeometry(0.07, 0.07, 0.5, 6),
      new THREE.MeshLambertMaterial({ color: cfg.color })
    );
    arm.position.set(s * 0.35, cfg.height * 0.35, 0);
    arm.rotation.z = s * Math.PI / 5;
    group.add(arm);
  }

  // Legs
  for (let s of [-1, 1]) {
    const leg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.09, 0.09, 0.6, 6),
      new THREE.MeshLambertMaterial({ color: 0x222244 })
    );
    leg.position.set(s * 0.12, 0.3, 0);
    group.add(leg);
  }

  // Selection ring (hidden initially)
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(0.45, 0.05, 6, 20),
    new THREE.MeshLambertMaterial({ color: 0x44ffff, emissive: 0x22aaaa })
  );
  ring.rotation.x = Math.PI / 2;
  ring.position.y = 0.05;
  ring.visible = false;
  ring.name = 'sel-ring';
  group.add(ring);

  return group;
}

const vehicleColors = [0xcc2222, 0x2255cc, 0xdddd22, 0x22aa44, 0x884488, 0xffffff, 0x333333];

function createVehicleMesh() {
  const group = new THREE.Group();
  const col = vehicleColors[Math.floor(Math.random() * vehicleColors.length)];

  const body = new THREE.Mesh(
    new THREE.BoxGeometry(4.2, 1.4, 2),
    new THREE.MeshLambertMaterial({ color: col })
  );
  body.position.y = 0.9;
  body.castShadow = true;
  group.add(body);

  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(2.2, 1.0, 1.8),
    new THREE.MeshLambertMaterial({ color: col })
  );
  cabin.position.set(-0.4, 2.0, 0);
  group.add(cabin);

  // Windows
  const winMat = new THREE.MeshLambertMaterial({ color: 0x88aacc, transparent: true, opacity: 0.7 });
  const winF = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 0.7), winMat);
  winF.position.set(-1.4, 2.05, 0);
  winF.rotation.y = Math.PI / 2;
  group.add(winF);

  // Wheels
  const wGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.25, 12);
  const wMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
  for (let fx of [-1.4, 1.4]) {

      const w = new THREE.Mesh(wGeo, wMat);
      w.rotation.z = Math.PI / 2;
      w.position.set(fx, 0.42, fz);
      group.add(w);
    }
  }

  return group;
}

// ═══════════════════════════════════════════════
//  SPAWN LOGIC
// ═══════════════════════════════════════════════
function spawnProtester(type) {
  const cost = State.costs[type];
  if (State.score < cost) {
    showFloatMsg(`❌ חסרים ${cost - State.score} נקודות`, 0xff4444);
    return;
  }
  State.score -= cost;
  updateHUD();

  const mesh = createProtesterMesh(type);
  const startX = -62 + Math.random() * 4 - 2;
  const startZ = (Math.random() - 0.5) * 4;
  mesh.position.set(startX, 0, startZ);

  const p = {
    mesh, type,
    state: 'walking', // walking | blocking | lying | fleeing
    speed: PROTESTER_TYPES[type].speed,
    resilience: PROTESTER_TYPES[type].resilience,
    wet: 0,
    targetX: (Math.random() - 0.5) * 20,
    targetZ: (Math.random() - 0.5) * 4,
    selected: false,
    id: Date.now() + Math.random(),
    bobPhase: Math.random() * Math.PI * 2,
  };

  scene.add(mesh);
  State.protesters.push(p);
  showFloatMsg(`+${PROTESTER_TYPES[type].label}!`, 0x44ffaa);
}

function spawnVehicle() {
  const mesh = createVehicleMesh();
  const side = Math.random() < 0.5 ? 1 : -1;
  mesh.position.set(side * 85, 0, (Math.random() - 0.5) * 5);
  if (side > 0) mesh.rotation.y = Math.PI;

  const v = {
    mesh,
    speed: 8 + Math.random() * 4,
    dir: -side,
    blocked: false,
    blockTime: 0,
    lane: (Math.random() - 0.5) * 5,
  };
  scene.add(mesh);
  State.vehicles.push(v);
}

function spawnPolice() {
  const mesh = createPoliceMesh();
  const side = Math.random() < 0.5 ? 1 : -1;
  mesh.position.set(side * 50, 0, (Math.random() - 0.5) * 6);

  const cop = {
    mesh,
    target: null,
    state: 'patrolling',
    speed: 2.5,
    arrestTimer: 0,
  };
  scene.add(mesh);
  State.police.push(cop);
}

// ═══════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════
let spawnVehicleTimer = 0;
let spawnPoliceTimer = 0;
let phaseTimer = 0;
let scoreTimer = 0;
let waterTimer = 0;

function gameLoop(dt) {
  if (!State.running) return;

  State.time += dt;
  spawnVehicleTimer += dt;
  phaseTimer += dt;
  scoreTimer += dt;
  waterTimer += dt;

  // Escalation phases
  if (phaseTimer > 30 && State.phase < 1) {
    State.phase = 1;
    showFloatMsg('🚗 נהגים מתחילים לכעוס!', 0xffaa00);
    updatePhaseBar();
  }
  if (phaseTimer > 60 && State.phase < 2) {
    State.phase = 2;
    showFloatMsg('🚔 המשטרה הגיעה!', 0xff4444);
    updatePhaseBar();
  }
  if (phaseTimer > 100 && State.phase < 3) {
    State.phase = 3;
    showFloatMsg('🐎 פרשים מגיעים!', 0xff6600);
    updatePhaseBar();
  }
  if (phaseTimer > 150 && State.phase < 4) {
    State.phase = 4;
    showFloatMsg('💧 המכת"זית הופעלה!', 0x44aaff);
    updatePhaseBar();
  }

  // Spawn vehicles
  const vSpawnRate = Math.max(0.5, 3 - State.phase * 0.3);
  if (spawnVehicleTimer > vSpawnRate) {
    spawnVehicleTimer = 0;
    if (State.vehicles.length < 20) spawnVehicle();
  }

  // Spawn police
  if (State.phase >= 2) {
    spawnPoliceTimer += dt;
    if (spawnPoliceTimer > 8 && State.police.length < State.phase * 2) {
      spawnPoliceTimer = 0;
      spawnPolice();
    }
  }

  // Score every second
  if (scoreTimer > 1) {
    scoreTimer = 0;
    const blockedVehicles = State.vehicles.filter(v => v.blocked).length;
    State.score += blockedVehicles * 10;
    State.jamKm = Math.min(10, blockedVehicles * 0.4);
    State.maxJam = Math.max(State.maxJam, State.jamKm);
  }

  // Water cannon fill
  if (State.phase >= 4) {
    State.waterLevel = Math.min(100, State.waterLevel + dt * 8);
    document.getElementById('water-fill').style.width = State.waterLevel + '%';
  }

  // Update entities
  updateProtesters(dt);
  updateVehicles(dt);
  updatePolice(dt);
  updateCamera(dt);

  updateHUD();

  // End if no protesters
  if (State.protesters.length === 0 && State.time > 10) {
    endGame();
  }
}

// ═══════════════════════════════════════════════
//  UPDATE PROTESTERS
// ═══════════════════════════════════════════════
function updateProtesters(dt) {
  State.protesters.forEach((p, i) => {
    if (!p.mesh) return;

    // Bob animation
    p.bobPhase += dt * 2;
    p.mesh.position.y = Math.abs(Math.sin(p.bobPhase)) * 0.05;

    if (p.state === 'fleeing') {
      p.mesh.position.x += (p.fleeDir || -1) * p.speed * 1.5 * dt;
      if (Math.abs(p.mesh.position.x) > 80) {
        scene.remove(p.mesh);
        State.score -= 20;
        showFloatMsg('-20 בורח!', 0xff4444, p.mesh.position);
        State.protesters.splice(i, 1);
        return;
      }
      return;
    }

    if (p.state === 'lying') return; // lying stays put

    // Move toward target
    const dx = p.targetX - p.mesh.position.x;
    const dz = p.targetZ - p.mesh.position.z;
    const dist = Math.sqrt(dx * dx + dz * dz);

    if (dist > 0.3) {
      const spd = p.speed * dt;
      p.mesh.position.x += (dx / dist) * spd;
      p.mesh.position.z += (dz / dist) * spd;
      p.mesh.rotation.y = Math.atan2(dx, dz);
    } else if (p.state === 'walking') {
      p.state = 'blocking';
    }

    // Water cannon effect
    if (State.phase >= 4 && p.state !== 'lying') {
      p.wet += dt * 0.2 * (p.resilience === 3 ? 0.3 : 1);
      if (p.wet > 1) {
        if (p.resilience < 2) {
          p.state = 'fleeing';
          p.fleeDir = p.mesh.position.x < 0 ? -1 : 1;
          showFloatMsg('😱 בורח!', 0xffaa44);
        } else {
          p.wet = 0.5; // veteran resists
        }
      }
    }
  });
}

// ═══════════════════════════════════════════════
//  UPDATE VEHICLES
// ═══════════════════════════════════════════════
function updateVehicles(dt) {
  State.vehicles.forEach((v, i) => {
    if (!v.mesh) return;

    // Check if blocked by protesters in road
    const vx = v.mesh.position.x;
    const vz = v.mesh.position.z;

    v.blocked = false;
    for (const p of State.protesters) {
      if (p.state === 'fleeing') continue;
      const pdx = p.mesh.position.x - vx;
      const pdz = p.mesh.position.z - vz;
      const pDist = Math.sqrt(pdx * pdx + pdz * pdz);
      const inFront = v.dir > 0 ? pdx > 0 && pdx < 12 : pdx < 0 && pdx > -12;
      if (pDist < 8 && inFront && Math.abs(p.mesh.position.z) < 7) {
        v.blocked = true;
        break;
      }
    }

    if (!v.blocked) {
      v.mesh.position.x += v.dir * v.speed * dt;
      v.blockTime = 0;
    } else {
      v.blockTime += dt;
      // Angry horn after 5s
      if (v.blockTime > 5 && Math.random() < 0.01) {
        showFloatMsg('📯 פיפ פיפ!', 0xffee44, v.mesh.position);
      }
    }

    // Remove if off screen
    if (Math.abs(v.mesh.position.x) > 90) {
      scene.remove(v.mesh);
      State.vehicles.splice(i, 1);
    }
  });
}

// ═══════════════════════════════════════════════
//  UPDATE POLICE
// ═══════════════════════════════════════════════
function updatePolice(dt) {
  State.police.forEach((cop, ci) => {
    if (!cop.mesh) return;

    // Find nearest protester
    let nearest = null, nearDist = Infinity;
    State.protesters.forEach(p => {
      const dx = p.mesh.position.x - cop.mesh.position.x;
      const dz = p.mesh.position.z - cop.mesh.position.z;
      const d = Math.sqrt(dx * dx + dz * dz);
      if (d < nearDist) { nearDist = d; nearest = p; }
    });

    if (nearest && nearDist < 40) {
      cop.target = nearest;
      const dx = cop.target.mesh.position.x - cop.mesh.position.x;
      const dz = cop.target.mesh.position.z - cop.mesh.position.z;
      const d = Math.sqrt(dx * dx + dz * dz);
      if (d > 1.5) {
        cop.mesh.position.x += (dx / d) * cop.speed * dt;
        cop.mesh.position.z += (dz / d) * cop.speed * dt;
        cop.mesh.rotation.y = Math.atan2(dx, dz);
      } else {
        // Arrest
        cop.arrestTimer += dt;
        const arrestTime = cop.target.state === 'lying' ? 6 : 3;
        if (cop.target.resilience === 3) {
          // veteran takes 3x longer
        }
        if (cop.arrestTimer > arrestTime * cop.target.resilience) {
          cop.arrestTimer = 0;
          const idx = State.protesters.indexOf(cop.target);
          if (idx !== -1) {
            showFloatMsg('🚔 נעצר!', 0xff4444, cop.target.mesh.position);
            scene.remove(cop.target.mesh);
            State.protesters.splice(idx, 1);
            cop.target = null;
          }
        }
      }
    }
  });
}

// ═══════════════════════════════════════════════
//  CAMERA MODES
// ═══════════════════════════════════════════════
let camTarget = new THREE.Vector3(0, 0, 0);
let camOrbit = { theta: Math.PI / 6, phi: Math.PI / 4, radius: 40 };
let camVelocity = new THREE.Vector3();

function setCameraMode(mode) {
  State.cameraMode = mode;
  document.querySelectorAll('.cam-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + mode).classList.add('active');

  if (mode === 'overhead') {
    camera.position.set(0, 50, 5);
    camera.lookAt(0, 0, 0);
  } else if (mode === 'street') {
    camera.position.set(-20, 1.7, -8);
    camera.lookAt(20, 1.7, 0);
  } else if (mode === 'follow' && State.protesters.length > 0) {
    State.focusTarget = State.selected.length > 0 
      ? State.selected[0] 
      : State.protesters[0];
  }
}

function updateCamera(dt) {
  if (State.cameraMode === 'follow' && State.focusTarget && State.focusTarget.mesh) {
    const tp = State.focusTarget.mesh.position;
    const desired = new THREE.Vector3(tp.x - 5, tp.y + 3, tp.z + 5);
    camera.position.lerp(desired, 5 * dt);
    camTarget.lerp(tp, 5 * dt);
    camera.lookAt(camTarget);
  }
  // 'overhead' and 'street' are static; 'free' is mouse-controlled
}

// ═══════════════════════════════════════════════
//  MOUSE CONTROLS
// ═══════════════════════════════════════════════
let isDraggingRight = false, lastMouseX = 0, lastMouseY = 0;
let isDraggingLeft = false, selBoxX0, selBoxY0;

function setupControls() {
  const canvas = renderer.domElement;

  canvas.addEventListener('mousedown', e => {
    if (e.button === 2) {
      isDraggingRight = true;
      lastMouseX = e.clientX; lastMouseY = e.clientY;
    }
    if (e.button === 0) {
      // Selection box start
      isDraggingLeft = true;
      selBoxX0 = e.clientX; selBoxY0 = e.clientY;
      const sel = document.getElementById('sel-box');
      sel.style.display = 'none';
    }
  });

  canvas.addEventListener('mousemove', e => {
    if (isDraggingRight) {
      const dx = e.clientX - lastMouseX;
      const dy = e.clientY - lastMouseY;
      lastMouseX = e.clientX; lastMouseY = e.clientY;

      if (State.cameraMode === 'free' || State.cameraMode === 'overhead') {
        camOrbit.theta -= dx * 0.005;
        camOrbit.phi = Math.max(0.1, Math.min(Math.PI / 2 - 0.05, camOrbit.phi - dy * 0.005));
        const r = camOrbit.radius;
        camera.position.set(
          camTarget.x + r * Math.sin(camOrbit.phi) * Math.sin(camOrbit.theta),
          camTarget.y + r * Math.cos(camOrbit.phi),
          camTarget.z + r * Math.sin(camOrbit.phi) * Math.cos(camOrbit.theta),
        );
        camera.lookAt(camTarget);
      }
    }

    if (isDraggingLeft) {
      const dx2 = e.clientX - selBoxX0;
      const dy2 = e.clientY - selBoxY0;
      if (Math.abs(dx2) > 5 || Math.abs(dy2) > 5) {
        const sel = document.getElementById('sel-box');
        sel.style.display = 'block';
        sel.style.left = Math.min(selBoxX0, e.clientX) + 'px';
        sel.style.top = Math.min(selBoxY0, e.clientY) + 'px';
        sel.style.width = Math.abs(dx2) + 'px';
        sel.style.height = Math.abs(dy2) + 'px';
      }
    }
  });

  canvas.addEventListener('mouseup', e => {
    if (e.button === 2) isDraggingRight = false;
    if (e.button === 0) {
      if (isDraggingLeft) {
        const sel = document.getElementById('sel-box');
        if (sel.style.display === 'block') {
          finishBoxSelect();
          sel.style.display = 'none';
        } else {
          // Single click — move selected or pick
          handleClick(e);
        }
        isDraggingLeft = false;
      }
    }
  });

  canvas.addEventListener('wheel', e => {
    camOrbit.radius = Math.max(5, Math.min(120, camOrbit.radius + e.deltaY * 0.05));
    if (State.cameraMode !== 'follow' && State.cameraMode !== 'street') {
      const r = camOrbit.radius;
      camera.position.set(
        camTarget.x + r * Math.sin(camOrbit.phi) * Math.sin(camOrbit.theta),
        camTarget.y + r * Math.cos(camOrbit.phi),
        camTarget.z + r * Math.sin(camOrbit.phi) * Math.cos(camOrbit.theta),
      );
    }
  });

  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // Keyboard
  window.addEventListener('keydown', e => {
    if (e.key === 'f' || e.key === 'F') {
      if (State.selected.length > 0) {
        State.focusTarget = State.selected[0];
        setCameraMode('follow');
      }
    }
    if (e.key === 'l' || e.key === 'L') {
      // Lie down
      State.selected.forEach(p => { p.state = 'lying'; });
      showFloatMsg('🛏 שוכבים!', 0x44ffaa);
    }
    if (e.key === 's' || e.key === 'S') {
      // Stand up
      State.selected.forEach(p => { if (p.state === 'lying') p.state = 'blocking'; });
    }
    if (e.key === 'Escape') {
      deselectAll();
    }
  });

  // Touch
  let lastTouchDist = 0;
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      lastTouchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }, { passive: true });

  canvas.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      camOrbit.radius = Math.max(5, Math.min(120, camOrbit.radius - (dist - lastTouchDist) * 0.1));
      lastTouchDist = dist;
    } else if (e.touches.length === 1) {
      const dx = e.touches[0].clientX - lastMouseX;
      const dy = e.touches[0].clientY - lastMouseY;
      camOrbit.theta -= dx * 0.005;
      camOrbit.phi = Math.max(0.1, Math.min(Math.PI / 2 - 0.05, camOrbit.phi - dy * 0.005));
      const r = camOrbit.radius;
      camera.position.set(
        camTarget.x + r * Math.sin(camOrbit.phi) * Math.sin(camOrbit.theta),
        camTarget.y + r * Math.cos(camOrbit.phi),
        camTarget.z + r * Math.sin(camOrbit.phi) * Math.cos(camOrbit.theta),
      );
      camera.lookAt(camTarget);
      lastMouseX = e.touches[0].clientX;
      lastMouseY = e.touches[0].clientY;
    }
  }, { passive: true });
}

function handleClick(e) {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Check protesters
  const protesterMeshes = State.protesters.map(p => p.mesh);
  const hits = raycaster.intersectObjects(protesterMeshes, true);
  
  if (hits.length > 0) {
    let hitMesh = hits[0].object;
    while (hitMesh.parent && hitMesh.parent !== scene) hitMesh = hitMesh.parent;
    const p = State.protesters.find(p => p.mesh === hitMesh);
    if (p) {
      if (!e.shiftKey) deselectAll();
      selectProtester(p);
      return;
    }
  }

  // Click on ground → move selected
  const groundHits = raycaster.intersectObjects([groundMesh, streetMesh]);
  if (groundHits.length > 0 && State.selected.length > 0) {
    const pt = groundHits[0].point;
    State.selected.forEach((p, i) => {
      p.targetX = pt.x + (Math.random() - 0.5) * 3;
      p.targetZ = pt.z + (Math.random() - 0.5) * 3;
      p.state = 'walking';
    });
    showFloatMsg('🏃 נעים!', 0x44ffaa);
    return;
  }

  if (!e.shiftKey) deselectAll();
}

function finishBoxSelect() {
  const sel = document.getElementById('sel-box');
  const rect = sel.getBoundingClientRect();

  const selected = [];
  State.protesters.forEach(p => {
    const pos = p.mesh.position.clone();
    pos.project(camera);
    const sx = (pos.x + 1) / 2 * innerWidth;
    const sy = (-pos.y + 1) / 2 * innerHeight;
    if (sx >= rect.left && sx <= rect.right && sy >= rect.top && sy <= rect.bottom) {
      selected.push(p);
    }
  });

  deselectAll();
  selected.forEach(selectProtester);
  if (selected.length > 0) showFloatMsg(`✅ נבחרו ${selected.length}`, 0x44ffaa);
}

function selectProtester(p) {
  p.selected = true;
  const ring = p.mesh.getObjectByName('sel-ring');
  if (ring) ring.visible = true;
  if (!State.selected.includes(p)) State.selected.push(p);
}

function deselectAll() {
  State.selected.forEach(p => {
    p.selected = false;
    const ring = p.mesh.getObjectByName('sel-ring');
    if (ring) ring.visible = false;
  });
  State.selected = [];
}

// ═══════════════════════════════════════════════
//  HUD UPDATES
// ═══════════════════════════════════════════════
function updateHUD() {
  document.getElementById('score-val').textContent = Math.floor(State.score);
  document.getElementById('protesters-val').textContent = State.protesters.length;
  document.getElementById('jam-val').textContent = State.jamKm.toFixed(1) + ' ק"מ';

  const mins = Math.floor(State.time / 60);
  const secs = Math.floor(State.time % 60);
  document.getElementById('timer-bar').textContent =
    String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
}

function updatePhaseBar() {
  const phases = ['🏁 התארגנות', '🚗 נהגים זועמים', '🚔 משטרה', '🐎 פרשים', '💧 מכת"זית'];
  document.getElementById('phase-bar').textContent = 'שלב: ' + phases[State.phase];
}

// ═══════════════════════════════════════════════
//  FLOATING MESSAGES
// ═══════════════════════════════════════════════
function showFloatMsg(text, color = 0xffffff, pos3d = null) {
  const layer = document.getElementById('msg-layer');
  const el = document.createElement('div');
  el.className = 'float-msg';
  el.textContent = text;

  let x = 50 + (Math.random() - 0.5) * 20;
  let y = 50 + (Math.random() - 0.5) * 20;

  if (pos3d) {
    const v = new THREE.Vector3(pos3d.x, pos3d.y, pos3d.z);
    v.project(camera);
    x = (v.x + 1) / 2 * 100;
    y = (-v.y + 1) / 2 * 100;
  }

  el.style.left = x + 'vw';
  el.style.top = y + 'vh';
  el.style.color = '#' + color.toString(16).padStart(6, '0');
  layer.appendChild(el);
  setTimeout(() => el.remove(), 1800);
}

// ═══════════════════════════════════════════════
//  SPECIALS
// ═══════════════════════════════════════════════
function useSpecial(type) {
  if (type === 'pashkevil' && State.score >= 500) {
    State.score -= 500;
    showFloatMsg('📜 תגבורת מגיעה!', 0xffff44);
    for (let i = 0; i < 3; i++) setTimeout(() => spawnProtester('youth'), i * 300);
  }
  if (type === 'shofar' && State.score >= 1000) {
    State.score -= 1000;
    showFloatMsg('🐏 הקפאה! המשטרה נעצרה!', 0xffff44);
    State.police.forEach(c => { c._frozen = 3; });
    setTimeout(() => State.police.forEach(c => delete c._frozen), 3000);
  }
}

// ═══════════════════════════════════════════════
//  GAME FLOW
// ═══════════════════════════════════════════════
function startGame(location) {
  State.location = location;
  State.score = 200; // starting budget
  State.time = 0;
  State.phase = 0;
  State.protesters = [];
  State.vehicles = [];
  State.police = [];
  State.selected = [];
  State.jamKm = 0;
  State.maxJam = 0;
  State.waterLevel = 0;
  State.running = true;
  spawnVehicleTimer = 0;
  spawnPoliceTimer = 0;
  phaseTimer = 0;
  scoreTimer = 0;
  waterTimer = 0;

  document.getElementById('splash').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('end-screen').classList.remove('show');

  buildCity(location);
  setCameraMode('overhead');
  updateHUD();
  updatePhaseBar();

  // Start with a few protesters
  setTimeout(() => spawnProtester('youth'), 500);
  setTimeout(() => spawnProtester('veteran'), 1000);
}

function endGame() {
  State.running = false;
  State.survived = State.protesters.length;
  State.score += State.survived * 100;

  document.getElementById('final-score').textContent = Math.floor(State.score);
  const m = Math.floor(State.time / 60), s = Math.floor(State.time % 60);
  document.getElementById('final-time').textContent = m + ':' + String(s).padStart(2, '0');
  document.getElementById('final-jam').textContent = State.maxJam.toFixed(1) + ' ק"מ';
  document.getElementById('final-survived').textContent = State.survived;

  document.getElementById('end-screen').classList.add('show');
}

function resetGame() {
  document.getElementById('end-screen').classList.remove('show');
  document.getElementById('hud').style.display = 'none';

  // Clear scene
  cityObjects.forEach(o => scene.remove(o));
  State.protesters.forEach(p => scene.remove(p.mesh));
  State.vehicles.forEach(v => scene.remove(v.mesh));
  State.police.forEach(c => scene.remove(c.mesh));

  document.getElementById('splash').style.display = 'flex';
}

// ═══════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  gameLoop(dt);
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function init() {
  document.getElementById('load-status').textContent = 'מאתחל Three.js...';
  initThree();

  document.getElementById('load-status').textContent = 'מוכן!';
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('splash').style.display = 'flex';
    animate();
  }, 800);
}

window.addEventListener('load', init);
</script>
</body>
</html>
